services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rts-app
    restart: unless-stopped
    ports:
      - "8095:80"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
    env_file:
      - .env
    extra_hosts:
      - "host.containers.internal:host-gateway"
    environment:
      APP_URL: http://localhost:8095
      DB_HOST: global-pgsql
      DB_PORT: 5432
      DB_DATABASE: realtime_trading_system
      DB_USERNAME: pgroot
      DB_PASSWORD: pgroot
      REDIS_HOST: global-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_CLIENT: predis
    networks:
      rts-network:
        aliases:
          - app-service
      global-db-net:

  queue_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rts-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: global-pgsql
      REDIS_HOST: global-redis
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
    networks:
      - rts-network
      - global-db-net
    command: supervisord -c /etc/supervisor/conf.d/supervisor-queue.conf

  matching_engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rts-matching-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: global-pgsql
      REDIS_HOST: global-redis
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
    networks:
      - rts-network
      - global-db-net
    command: supervisord -c /etc/supervisor/conf.d/supervisor-engine.conf

  reverb:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rts-reverb
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: global-pgsql
      REDIS_HOST: global-redis
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - vendor_data:/var/www/html/vendor
    networks:
      - rts-network
      - global-db-net
    command: supervisord -c /etc/supervisor/conf.d/supervisor-reverb.conf

volumes:
  vendor_data:
    driver: local

networks:
  rts-network:
    driver: bridge
  global-db-net:
    external: true